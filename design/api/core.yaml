openapi: 3.0.3
info:
  title: EnvVault Core API
  version: 0.1.0
  description: Core EnvVault APIs for organization, project, environment, folder, secret key/value, audit, and development token testing.
servers:
  - url: http://localhost:8880
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth Dev
  - name: Auth
    description: |
      Local email + password authentication. See `design/DESIGN.md`「认证 & 用户（v9）」.
      - `register` / `login` are anonymous; first registrant becomes `platform_admin` (global).
      - `logout` / `changePassword` require a valid JWT; both bump
        `users.tokens_valid_after` to invalidate the caller's other sessions.
  - name: Current User
  - name: Organizations
  - name: Projects
  - name: Environments
  - name: Folders
  - name: Secrets
  - name: Audit
  - name: Tree
    description: |
      Hierarchical resource tree for frontend cascading filters. Returns the
      full `org → project → env → folder(l1) → folder(l2)` shape in a single
      call, with RBAC narrowing applied per node. Backed by Redis cache.
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/readyz:
    get:
      tags: [Health]
      summary: Readiness check
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Success"

  /api/v1/auth/dev/token:
    post:
      tags: [Auth Dev]
      summary: Create a development JWT
      description: Only available when auth.dev_token_enabled is true. Do not enable in production.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevTokenRequest"
      responses:
        "200":
          description: Development JWT.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DevToken"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Self-register a new account
      description: |
        Self-registration endpoint. The **first** user to register automatically
        receives the `platform_admin` role (global scope), making it the bootstrap
        admin for a fresh deployment. Subsequent registrations have no role grants
        until a platform_admin assigns them.

        Rate-limited per IP. If `auth.register_enabled=false`, returns 403.
        Password must be at least `auth.password_min_length` characters.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
      responses:
        "200":
          description: Account created and JWT issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthTokenResponse"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        Email + password authentication. Returns 401 for both "email not found"
        and "wrong password" (no user enumeration). Rate-limited per IP:
        `auth.login_rate_limit` failures within `auth.login_rate_limit_window`
        triggers a 15-minute lockout (`auth.lockout_duration`).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthTokenResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Force logout
      description: |
        Revokes the caller's current JWT by setting `users.tokens_valid_after = NOW()`.
        All previously-issued JWTs for this user become invalid (401 on next
        request) within the in-process cache propagation window
        (`auth.tokens_cache_refresh`, default 1 minute).

        Idempotent: calling on an already-logged-out session is a no-op.
      responses:
        "204":
          description: Logged out.

  /api/v1/auth/changePassword:
    post:
      tags: [Auth]
      summary: Change the caller's password
      description: |
        Verifies the old password, then atomically updates the password hash
        and bumps `tokens_valid_after` (effectively logging out all existing
        sessions for this user). New password must be at least
        `auth.password_min_length` characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChangePasswordRequest"
      responses:
        "200":
          description: Password changed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changed:
                            type: boolean
                            example: true
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/me:
    get:
      tags: [Current User]
      summary: Current authenticated user
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserInfo"

  /api/v1/org/list:
    post:
      tags: [Organizations]
      summary: List organizations
      description: |
        Lists organizations the caller has access to, narrowed by the caller's
        active `user_role_bindings` (v7+). The result is a subset of the org
        hierarchy:

        - `platform_admin` (bound at `global`): returns all non-deleted orgs.
        - `org_admin` / `org_owner` / `org_viewer` / `org_auditor` bound at
          `(organization, X)`: returns org X (and any cascaded children if
          relevant).
        - A caller with no active binding for `org:read`: returns an empty
          list (implicit 200, no 403).

        The list is no longer gated by an `allowScope` against a fixed scope;
        the SQL itself filters by `(scope_type, scope_id)` derived from the
        caller's bindings. See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          $ref: "#/components/responses/OrganizationList"

  /api/v1/org/create:
    post:
      tags: [Organizations]
      summary: Create organization
      requestBody:
        $ref: "#/components/requestBodies/CreateEntity"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/org/info:
    post:
      tags: [Organizations]
      summary: Get organization
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/org/update:
    post:
      tags: [Organizations]
      summary: Update organization
      requestBody:
        $ref: "#/components/requestBodies/UpdateByIdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/org/delete:
    post:
      tags: [Organizations]
      summary: Delete organization
      description: |
        Soft-deletes the organization. Behavior depends on the `force` flag:

        - `force=false` (default): if the org has any **active** (non-soft-deleted) project,
          returns 409 Conflict without touching any data.
        - `force=true`: cascades the soft-delete to **all** child resources
          (projects → environments → folders → secrets). Requires both
          `org:delete` and `org:force_delete` permissions.

        All deletions are soft (`is_deleted = true`); rows are retained in the
        database. The deletion is atomic: a failure mid-cascade rolls back
        everything in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/IdOrCodeRequest"
                - type: object
                  properties:
                    force:
                      type: boolean
                      default: false
                      description: |
                        When `true`, cascades the soft-delete to all child resources
                        (projects, environments, folders, secrets) atomically.
                        Requires the `org:force_delete` permission in addition to `org:delete`.
                      example: false
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Organization has active child resources. Caller must pass `force=true`
            to cascade, or remove the child resources first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
              example:
                code: 1409
                msg: organization has 3 active project(s); pass force=true to cascade delete
                data: null

  /api/v1/project/list:
    post:
      tags: [Projects]
      summary: List projects
      description: |
        Lists projects under `orgId` that the caller has access to, narrowed by
        the caller's active `user_role_bindings` (v7+). The org parent filter
        (`orgId`) is still required and applied first; the narrowing then
        trims further:

        - `platform_admin` (bound at `global`): returns all non-deleted
          projects under `orgId`.
        - Caller with `project:read` at `(project, P_i)` under `orgId`:
          returns `P_i`.
        - Caller with `project:read` at `(organization, orgId)` (e.g.
          `org_admin`): returns all projects under `orgId` (cascading).
        - Caller with no active binding: returns an empty list.

        Results are ordered by `sortOrder ASC, createdAt ASC`. Standard
        environment codes default to `dev=10`, `test=20`, `sim=30`,
        `prod=40`; custom codes default to `100`.

        See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PageRequest"
                - type: object
                  properties:
                    orgId:
                      type: string
                      format: uuid
      responses:
        "200":
          $ref: "#/components/responses/ProjectList"

  /api/v1/project/create:
    post:
      tags: [Projects]
      summary: Create project
      description: |
        Creates the project and, atomically, the listed environments. Folders under
        each environment are NOT auto-created — call /api/v1/folder/create explicitly
        for each folder you need. For each environment code, an org-level
        `environment_templates` row is upserted on first write and reused thereafter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/CreateChildEntityRequest"
                - type: object
                  properties:
                    environments:
                      type: array
                      items:
                        $ref: "#/components/schemas/EnvSpec"
                      description: |
                        Environments to create under the new project. If omitted, no environments
                        are created and the caller must create them via /api/v1/env/create.
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/project/info:
    post:
      tags: [Projects]
      summary: Get project
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/project/update:
    post:
      tags: [Projects]
      summary: Update project
      requestBody:
        $ref: "#/components/requestBodies/UpdateByIdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/project/delete:
    post:
      tags: [Projects]
      summary: Delete project
      description: |
        Soft-deletes the project **and** all child environments, folders, and secrets
        under it, in a single transaction. Child resources are filtered out of
        subsequent list/info responses.
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"

  /api/v1/env/list:
    post:
      tags: [Environments]
      summary: List environments
      description: |
        Lists environments under `projectId` that the caller has access to,
        narrowed by the caller's active `user_role_bindings` (v7+). The
        project parent filter (`projectId`) is still required and applied
        first; the narrowing then trims further:

        - `platform_admin`: returns all environments under `projectId`.
        - Caller with `env:read` at `(environment, E_i)` under `projectId`:
          returns `E_i`.
        - Caller with `env:read` at `(project, projectId)` (e.g.
          `project_admin`): returns all environments under `projectId`
          (cascading).
        - Caller with `env:read` at `(organization, org)` that owns
          `projectId` (e.g. `org_admin`): returns all environments under
          `projectId` (cascading).
        - Caller with no active binding: returns an empty list.

        See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PageRequest"
                - type: object
                  required: [projectId]
                  properties:
                    projectId:
                      type: string
                      format: uuid
                      description: Project whose environments to list.
      responses:
        "200":
          $ref: "#/components/responses/EnvironmentList"

  /api/v1/env/create:
    post:
      tags: [Environments]
      summary: Create environment
      description: |
        Creates an environment under the project identified by `parentId`. **No
        default folders are created** — call /api/v1/folder/create explicitly for
        each folder you need. Upserts the org-level `environment_templates` row for
        the new env code (snapshot on first write only).
      requestBody:
        $ref: "#/components/requestBodies/CreateChildEntity"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/env/info:
    post:
      tags: [Environments]
      summary: Get environment
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/env/update:
    post:
      tags: [Environments]
      summary: Update environment
      requestBody:
        $ref: "#/components/requestBodies/UpdateByIdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/env/delete:
    post:
      tags: [Environments]
      summary: Delete environment
      description: |
        Soft-deletes the environment **and** all child folders and secrets under it,
        in a single transaction.
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"

  /api/v1/env/template/list:
    post:
      tags: [Environments]
      summary: List environment templates for an org
      description: |
        Read-only summary of env codes the org has ever instantiated. The template's
        name/comment is the snapshot from the first write; updating individual
        environments does not change the template.

        Narrowed by the caller's active `user_role_bindings` (v7+):

        - `platform_admin`: returns all non-deleted templates under `orgId`.
        - Caller with `env:template:read` at `(organization, orgId)` (e.g.
          `org_admin` / `org_viewer` / `org_auditor`): returns all
          templates under `orgId`.
        - Caller with no active binding: returns an empty list.

        See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PageRequest"
                - type: object
                  required: [orgId]
                  properties:
                    orgId:
                      type: string
                      format: uuid
      responses:
        "200":
          $ref: "#/components/responses/EnvironmentTemplateList"

  /api/v1/env/template/info:
    post:
      tags: [Environments]
      summary: Get a single environment template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/IdOrCodeRequest"
                - type: object
                  description: |
                    For this endpoint, `parentId` carries the orgId and `code` is the env code.
      responses:
        "200":
          $ref: "#/components/responses/EnvironmentTemplate"

  /api/v1/folder/list:
    post:
      tags: [Folders]
      summary: List folders
      description: |
        Lists folders under either an environment (level=1 folders) or under a specific
        parent folder (level=2 folders). The two modes are mutually exclusive:

        - `environmentId` set: returns all `level=1` folders directly under that
          environment (`parent_id IS NULL`).
        - `folderParentId` set: returns all `level=2` folders under that parent
          folder. The environment is inferred from the parent folder server-side.

        Narrowed by the caller's active `user_role_bindings` (v7+):

        - `platform_admin`: returns all matching folders.
        - Caller with `folder:read` at `(folder, F_i)`: returns `F_i` if it
          matches the parent filter.
        - Caller with `folder:read` at `(environment, E)` and parent filter
          is `environmentId == E`: returns all `level=1` folders under `E`
          (cascading).
        - Caller with `folder:read` at `(project, P)` or `(organization, O)`
          that owns the resolved environment: returns matching folders
          (cascading across the 4-level chain folder → env → project → org).
        - Caller with no active binding: returns an empty list.

        `includeSubfolders` (v10+): when `true` AND the request uses
        `environmentId` mode, each item in `list` becomes a `FolderWithSubfolders`
        whose `subfolders` array carries that parent's level=2 children. This
        collapses what would otherwise be N+1 round-trips (one to list level=1
        folders, then one per parent to list its children) into a single call.
        Only valid in `environmentId` mode; passing `true` with `folderParentId`
        returns 400 (the current schema only goes to level=2, so there is no
        level=3 to nest). Default `false`; response shape is then identical to
        historical calls (no `subfolders` field on list items).

        See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）" and
        §"Folder 路径访问 - list 嵌套子 folder".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PageRequest"
                - type: object
                  properties:
                    environmentId:
                      type: string
                      format: uuid
                      description: List level=1 folders under this environment.
                    folderParentId:
                      type: string
                      format: uuid
                      description: List level=2 folders under this parent folder.
                    includeSubfolders:
                      type: boolean
                      default: false
                      description: |
                        When `true` (only with `environmentId` mode), each list item
                        carries a `subfolders: [Entity, ...]` field with the parent's
                        level=2 children. See endpoint description for details.
                  description: Exactly one of environmentId or folderParentId is required.
            examples:
              envOnly:
                summary: List level=1 folders under an env (default, no nesting)
                value:
                  pageNum: 1
                  pageSize: 20
                  environmentId: "11111111-1111-1111-1111-111111111111"
              envWithChildren:
                summary: List level=1 folders, with subfolders array on each item
                value:
                  pageNum: 1
                  pageSize: 20
                  environmentId: "11111111-1111-1111-1111-111111111111"
                  includeSubfolders: true
              parentOnly:
                summary: List level=2 folders under a parent folder
                value:
                  pageNum: 1
                  pageSize: 20
                  folderParentId: "22222222-2222-2222-2222-222222222222"
      responses:
        "200":
          description: |
            Folder list. Each item is `Entity` by default. When the request set
            `includeSubfolders: true`, each item is upgraded to
            `FolderWithSubfolders` (Entity fields + `subfolders: [Entity, ...]`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
              examples:
                defaultFlat:
                  summary: Default response (no includeSubfolders)
                  value:
                    code: 0
                    msg: success
                    data:
                      pageNum: 1
                      pageSize: 20
                      total: 2
                      list:
                        - id: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
                          parentId: "11111111-1111-1111-1111-111111111111"
                          code: globals
                          name: Globals
                          comment: ""
                          createdBy: dev-user
                          createdByLabel: Dev User
                          updatedBy: dev-user
                          updatedByLabel: Dev User
                          createdAt: "2026-06-01T10:00:00Z"
                          updatedAt: "2026-06-01T10:00:00Z"
                        - id: "bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb"
                          parentId: "11111111-1111-1111-1111-111111111111"
                          code: groups-secrets
                          name: Group Secrets
                          comment: ""
                          createdBy: dev-user
                          createdByLabel: Dev User
                          updatedBy: dev-user
                          updatedByLabel: Dev User
                          createdAt: "2026-06-01T10:00:00Z"
                          updatedAt: "2026-06-01T10:00:00Z"
                withSubfolders:
                  summary: includeSubfolders=true (each item carries its level=2 children)
                  value:
                    code: 0
                    msg: success
                    data:
                      pageNum: 1
                      pageSize: 20
                      total: 2
                      list:
                        - id: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
                          parentId: "11111111-1111-1111-1111-111111111111"
                          code: globals
                          name: Globals
                          comment: ""
                          createdBy: dev-user
                          createdByLabel: Dev User
                          updatedBy: dev-user
                          updatedByLabel: Dev User
                          createdAt: "2026-06-01T10:00:00Z"
                          updatedAt: "2026-06-01T10:00:00Z"
                          subfolders:
                            - id: "cccccccc-cccc-cccc-cccc-cccccccccccc"
                              parentId: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
                              code: aws
                              name: AWS
                              comment: ""
                              createdBy: dev-user
                              createdByLabel: Dev User
                              updatedBy: dev-user
                              updatedByLabel: Dev User
                              createdAt: "2026-06-01T10:00:00Z"
                              updatedAt: "2026-06-01T10:00:00Z"
                            - id: "dddddddd-dddd-dddd-dddd-dddddddddddd"
                              parentId: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
                              code: db
                              name: DB
                              comment: ""
                              createdBy: dev-user
                              createdByLabel: Dev User
                              updatedBy: dev-user
                              updatedByLabel: Dev User
                              createdAt: "2026-06-01T10:00:00Z"
                              updatedAt: "2026-06-01T10:00:00Z"
                        - id: "bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb"
                          parentId: "11111111-1111-1111-1111-111111111111"
                          code: groups-secrets
                          name: Group Secrets
                          comment: ""
                          createdBy: dev-user
                          createdByLabel: Dev User
                          updatedBy: dev-user
                          updatedByLabel: Dev User
                          createdAt: "2026-06-01T10:00:00Z"
                          updatedAt: "2026-06-01T10:00:00Z"
                          subfolders: []
        "400":
          description: |
            Bad request. Returned when neither `environmentId` nor `folderParentId`
            is supplied, when both are supplied, or when `includeSubfolders=true`
            is combined with `folderParentId` (only valid in `environmentId` mode).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
              examples:
                includeSubfoldersWithoutEnv:
                  summary: |
                    `includeSubfolders=true` is only valid with `environmentId`;
                    passing it with `folderParentId` is rejected.
                  value:
                    code: 1002
                    msg: includeSubfolders only valid with environmentId
                    data: null
                missingBothFilters:
                  summary: Neither environmentId nor folderParentId supplied.
                  value:
                    code: 1002
                    msg: environmentId or folderParentId is required
                    data: null
                bothFiltersSupplied:
                  summary: environmentId and folderParentId are mutually exclusive.
                  value:
                    code: 1002
                    msg: environmentId and folderParentId are mutually exclusive
                    data: null

  /api/v1/folder/create:
    post:
      tags: [Folders]
      summary: Create folder
      description: |
        Creates one folder per env in `envList`, in a single transaction. The
        API is deliberately batch-only: there is no single-env shortcut on
        this endpoint. To create a folder in just one env, pass
        `envList: ["<env-id>"]`.

        **`envList` is REQUIRED and must be non-empty.** Each element is the
        **id of an environment (UUID)**, not the env code. If the array is
        missing or empty, the response is `{"code": -1, "msg": "envList is
        required and cannot be empty", "data": null}`.

        **Two flavors** keyed by `level`:

        - `level=1` (top-level folder, `parent_id=NULL`): `parentCode` is
          ignored. The server creates one `level=1` folder per env in
          `envList`. The response's `parentId` on each created entity
          carries that env's id.
        - `level=2` (sub-folder): `parentCode` is **required** and carries
          the **code** of the `level=1` parent folder. The server looks up
          the `level=1` folder with `code = parentCode` inside each env in
          `envList` and creates a `level=2` child under it. The response's
          `parentId` on each created entity carries the matching sibling
          parent's id in that env.

        The legacy `parentId` (folder uuid) field is **gone**; callers no
        longer need to first look up a parent folder's id before they can
        replicate the same tree across envs.

        **Atomicity**: the entire batch runs in one transaction. Any of the
        following fails the whole batch and rolls back to the pre-call state:
        any `envId` not found, any `level=1` sibling parent with the
        requested `parentCode` missing in an env (level=2 only), or the
        new `code` already exists at the target location.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
            examples:
              topLevelBatch:
                summary: Top-level folder batch (level=1, no parentCode)
                value:
                  level: 1
                  code: globals
                  name: Globals
                  envList:
                    - "11111111-1111-1111-1111-111111111111"
                    - "22222222-2222-2222-2222-222222222222"
                    - "33333333-3333-3333-3333-333333333333"
              subFolderBatch:
                summary: Sub-folder batch (level=2 + parentCode)
                value:
                  level: 2
                  code: child-folder-aaaa
                  name: child-folder aaaa
                  comment: 测试子folder aaa
                  parentCode: payment
                  envList:
                    - "11111111-1111-1111-1111-111111111111"
                    - "22222222-2222-2222-2222-222222222222"
                    - "33333333-3333-3333-3333-333333333333"
      responses:
        "200":
          description: |
            Successful batch creation. `data` is `{ "created": [Entity, ...] }`,
            in the same order as `envList`. For each created entity, the
            polymorphic `parentId` is set as follows:

            - `level=1`: the env id (the folder's direct parent in the hierarchy).
            - `level=2`: the matching `level=1` sibling parent's id in that env.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseOfCreateFoldersBatch"
              examples:
                batchTopLevel:
                  summary: "Top-level batch (level=1): data.created[i].parentId = env id"
                  value:
                    code: 0
                    msg: success
                    data:
                      created:
                        - id: "66666666-6666-6666-6666-666666666661"
                          code: globals
                          name: Globals
                          parentId: "11111111-1111-1111-1111-111111111111"
                        - id: "66666666-6666-6666-6666-666666666662"
                          code: globals
                          name: Globals
                          parentId: "22222222-2222-2222-2222-222222222222"
                        - id: "66666666-6666-6666-6666-666666666663"
                          code: globals
                          name: Globals
                          parentId: "33333333-3333-3333-3333-333333333333"
                batchSubFolder:
                  summary: "Sub-folder batch (level=2): data.created[i].parentId = sibling parent id"
                  value:
                    code: 0
                    msg: success
                    data:
                      created:
                        - id: "33333333-3333-3333-3333-333333333333"
                          code: child-folder-aaaa
                          name: child-folder aaaa
                          parentId: "<dev env's sibling parent id (parentCode=payment)>"
                        - id: "44444444-4444-4444-4444-444444444444"
                          code: child-folder-aaaa
                          name: child-folder aaaa
                          parentId: "<test env's sibling parent id (parentCode=payment)>"
                        - id: "55555555-5555-5555-5555-555555555555"
                          code: child-folder-aaaa
                          name: child-folder aaaa
                          parentId: "<sim env's sibling parent id (parentCode=payment)>"
        "200-with-error":
          description: |
            **Business error returned with HTTP 200 and `data.code = -1`**
            (envVault convention for generic business failures):

            - `envList` missing or empty
              ```json
              {"code": -1, "msg": "envList is required and cannot be empty", "data": null}
              ```
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        "400":
          description: |
            - `level` not in {1, 2}
            - `code` doesn't match `^[a-z0-9]+(-[a-z0-9]+)*$`
            - any element of `envList` is not a UUID
            - `level=2` without `parentCode`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: |
            - Any `envId` in `envList` does not exist (or is soft-deleted).
            - For `level=2`: any target env has no `level=1` folder with
              the requested `parentCode`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        "409":
          description: |
            The new `code` already exists at the target location. The whole
            batch is rolled back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /api/v1/folder/info:
    post:
      tags: [Folders]
      summary: Get folder
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/folder/update:
    post:
      tags: [Folders]
      summary: Update folder
      description: |
        Updates a folder's `name` and `comment` only.

        **Field contract** (locked, do not extend without revisiting auth):
          - Modifiable: `name`, `comment`
          - Immutable through this endpoint: `id`, `code`, `environmentId`,
            `parentId`, `level`, `createdBy`, `createdAt`
          - The `parentId` field in the request body, if present, is **only**
            used as a lookup helper together with `code` to resolve the folder
            id; it is never written to the folder row.

        **Permission**: requires `folder:update` on the target folder. No
        additional permission checks.

        Use `code`-based addressing only when `id` is unknown; when both are
        supplied `id` wins and `code` is ignored.
      requestBody:
        $ref: "#/components/requestBodies/UpdateByIdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Entity"

  /api/v1/folder/delete:
    post:
      tags: [Folders]
      summary: Delete folder
      description: |
        Soft-deletes the folder **and** all secrets under it, in a single transaction.
      requestBody:
        $ref: "#/components/requestBodies/IdOrCode"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"

  /api/v1/folder/listByProject:
    post:
      tags: [Folders]
      summary: List all folders in a project, aggregated by code
      description: |
        Returns the full folder structure under a project, grouped by `code` —
        a single `FolderGroup` is emitted per unique `level=1` code, with the
        set of envs in which that folder exists as `envList`. Each group's
        `subFolders` lists its `level=2` children (also grouped by code).

        **Use case**: the frontend wants to render a "folder tree" filtered to
        a single project, with per-code multi-env awareness. A typical
        rendering walks `folderList[*]` and, for each group, draws the
        folder's chip + a small badge showing how many envs it spans, then
        expands `subFolders` on click.

        **Contract — "子目录跟随父目录"**: when a parent (level=1) group
        appears in the result, all of its level=2 children (within the same
        project, narrowed by caller's `folder:read` permission) are
        guaranteed to be present in `subFolders`. The reverse is not
        guaranteed: if a parent is hidden by RBAC, its children are
        discarded along with it (no orphan entries).

        **Per-instance fields**: `id`, `name`, `comment` are taken from the
        first env instance of that code (typical deployments keep these
        consistent across envs). If you need exact per-env values, follow
        up with `/api/v1/folder/info`.

        **RBAC**: narrowed server-side by the caller's `user_role_bindings`
        on the (folder, environment, project, organization) chain. The
        response only includes folders the caller is allowed to read.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFolderRequest"
            examples:
              acmeWeb:
                summary: "List all folders in project <web>"
                value:
                  projectId: "11111111-1111-1111-1111-111111111111"
      responses:
        "200":
          description: |
            Aggregated folder tree. `folderList` is sorted by `code` ascending;
            each group's `subFolders` is also sorted by `code` ascending.
            `folderList` is **always** a JSON array (possibly empty) — never
            `null` — so the client can iterate unconditionally.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProjectFolderTree"
              examples:
                twoEnvs:
                  summary: "Project with 2 level-1 folders in 3 envs and 1 shared sub-folder"
                  value:
                    code: 0
                    msg: success
                    data:
                      folderList:
                        - id: "22222222-2222-2222-2222-222222222222"
                          code: globals
                          name: Globals
                          comment: 默认全局
                          envList:
                            - "33333333-3333-3333-3333-333333333331"
                            - "33333333-3333-3333-3333-333333333332"
                            - "33333333-3333-3333-3333-333333333333"
                          subFolders: []
                        - id: "44444444-4444-4444-4444-444444444441"
                          code: payment
                          name: Payment Providers
                          envList:
                            - "33333333-3333-3333-3333-333333333331"
                            - "33333333-3333-3333-3333-333333333332"
                          subFolders:
                            - id: "55555555-5555-5555-5555-555555555551"
                              code: stripe
                              name: Stripe
                              envList:
                                - "33333333-3333-3333-3333-333333333331"
                                - "33333333-3333-3333-3333-333333333332"
                emptyProject:
                  summary: "Empty result for a project with no folders"
                  value:
                    code: 0
                    msg: success
                    data:
                      folderList: []
        "400":
          description: "`projectId` missing or not a valid UUID."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: "Tree service is not configured (deps not wired at startup)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /api/v1/secret/list:
    post:
      tags: [Secrets]
      summary: List secrets without plaintext values
      description: |
        Lists secrets matching the optional `environmentId` / `folderId` filters,
        narrowed by the caller's active `user_role_bindings` (v7+). Plaintext
        values are not returned.

        Requires `secret:list`. Narrowing chain:
        `secret → folder → environment → project → organization`. A binding
        at any of these scopes automatically extends visibility to its
        descendants:

        - `platform_admin`: returns all matching secrets.
        - Caller with `secret:list` at `(secret, S)`: returns `S` if it
          matches the filters.
        - Caller with `secret:list` at `(folder, F)`: returns all secrets
          under `F` (cascading).
        - Caller with `secret:list` at `(environment, E)` and
          `environmentId == E`: returns all secrets under `E`.
        - Caller with `secret:list` at `(project, P)` that owns the resolved
          environment, or at `(organization, O)` that owns `P`: returns all
          matching secrets in the resolved environment (cascading).
        - Caller with no active binding: returns an empty list.

        See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）".
      requestBody:
        $ref: "#/components/requestBodies/SecretList"
      responses:
        "200":
          $ref: "#/components/responses/SecretList"

  /api/v1/secret/search:
    post:
      tags: [Secrets]
      summary: Search secrets by key without plaintext values
      description: |
        Search secrets by `key` (case-insensitive substring) under the optional
        `environmentId` / `folderId` filters, narrowed by the caller's active
        `user_role_bindings` (v7+). Requires `secret:search` (one permission
        tier above `secret:list`).

        The narrowing rules are identical to `/api/v1/secret/list`, but the
        permission code is `secret:search` instead of `secret:list`. The
        Redis secret cache is **not** consulted for this endpoint (cache
        cannot be narrowed per-caller); results come directly from PostgreSQL.

        See `design/DESIGN.md` §"List 接口按 caller 权限收窄（v7）".
      requestBody:
        $ref: "#/components/requestBodies/SecretSearch"
      responses:
        "200":
          $ref: "#/components/responses/SecretList"

  /api/v1/secret/create:
    post:
      tags: [Secrets]
      summary: Create secret key/value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretUpsertRequest"
      responses:
        "200":
          $ref: "#/components/responses/Secret"

  /api/v1/secret/info:
    post:
      tags: [Secrets]
      summary: Get secret metadata without plaintext value
      requestBody:
        $ref: "#/components/requestBodies/ID"
      responses:
        "200":
          $ref: "#/components/responses/Secret"

  /api/v1/secret/reveal:
    post:
      tags: [Secrets]
      summary: Reveal secret plaintext value
      requestBody:
        $ref: "#/components/requestBodies/ID"
      responses:
        "200":
          $ref: "#/components/responses/Secret"

  /api/v1/secret/update:
    post:
      tags: [Secrets]
      summary: Update secret key/value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/IDRequest"
                - $ref: "#/components/schemas/SecretUpsertRequest"
      responses:
        "200":
          $ref: "#/components/responses/Secret"

  /api/v1/secret/delete:
    post:
      tags: [Secrets]
      summary: Delete secret
      requestBody:
        $ref: "#/components/requestBodies/ID"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"

  /api/v1/secret/path/info:
    post:
      tags: [Secrets]
      summary: Get secret metadata by org.proj.env.folder.KEY path
      description: |
        Resolves a 4-level code path to the secret metadata via a single 5-table
        join. RBAC still applies (`secret:read`). Does not return the plaintext
        `value` field. The path is `org_code.project_code.env_code.folder_code.KEY`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretPathRequest"
      responses:
        "200":
          $ref: "#/components/responses/Secret"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/secret/path/reveal:
    post:
      tags: [Secrets]
      summary: Reveal secret plaintext by org.proj.env.folder.KEY path
      description: |
        Resolves a 4-level code path to the secret, then runs the standard reveal
        flow (decrypt + reveal audit). RBAC still applies (`secret:reveal`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretPathRequest"
      responses:
        "200":
          $ref: "#/components/responses/Secret"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/secret/path/batchReveal:
    post:
      tags: [Secrets]
      summary: Batch reveal secrets by folder path and optional key list
      description: |
        Resolves a 4-level code path to a folder, then reveals the plaintext of every
        secret under it in one round-trip. Designed for SDK / K8s integrations that
        need to pull several keys (e.g. `DATABASE_URL`, `API_KEY`, `REDIS_URL`) at
        once without making N serial `/secret/path/reveal` calls.

        - `path`: 4-segment code path of the folder (`org_code.project_code.env_code.folder_code`).
        - `keys`: optional list of secret keys to reveal. Empty / omitted = all secrets in the folder.

        RBAC still applies (`secret:reveal`) with the v7 cascade narrowing chain
        (`secret → folder → environment → project → organization`). The endpoint
        reuses the same `user_read_scopes` CTE as `ListSecrets` / `SearchSecrets`,
        so a binding at any of these scopes automatically extends visibility to
        the folder.

        Behavior:

        - No pagination / no upper bound (a folder can have arbitrarily many secrets;
          this is a deliberate trade-off, see `design/todo.md` §"v8").
        - `list` is ordered by secret `key` ASC.
        - Each item's `value` field is the plaintext (same as `/secret/reveal`).
        - `notFound` is the set of request keys that did not match any secret in
          the folder. Only present when `keys` is non-empty; absent when `keys` is
          omitted / empty (no comparison possible).
        - **One** audit record is written per call, with `action="reveal_batch"`,
          `resource_type="folder"`, `resource_id=<folder.id>`, and
          `encrypted_value=jsonb(["KEY1", "KEY2", ...])` recording the keys that
          were actually revealed (request keys when supplied, otherwise the
          keys that hit). If no key matches, no audit is written.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretPathBatchRevealRequest"
      responses:
        "200":
          description: Batch reveal response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SecretPathBatchRevealResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/secret/code/batchReveal:
    post:
      tags: [Secrets]
      summary: Batch reveal all secrets under a folder resolved by 4-level code
      description: |
        Resolves a folder from **structured** 4-level codes (`orgCode`,
        `projectCode`, `environmentCode`, `folderCode`) — not a path string —
        and reveals the plaintext of every secret under it in one round-trip.

        Functionally equivalent to `/secret/path/batchReveal` with `keys`
        omitted: same `user_read_scopes` CTE, same v7 cascade narrowing chain
        (`secret → folder(level 2) → folder(level 1) → environment → project
        → organization`) for `secret:reveal`, same response shape
        (`secretList`), same audit
        (`action="reveal_batch"`, one record per call, `encrypted_value=jsonb(keys)`).

        - **Why use this over `/path/batchReveal`**: the input is structured
          (each code is its own JSON field), so server-side path splitting is
          avoided and each code segment can be validated / logged individually.
        - **Why use the path version instead**: when the caller already has a
          single `path` string (e.g. templates, copy-paste from UI), the path
          variant is one less parse step on the client.
        - The two endpoints are independent; both stay.
        - No pagination, no upper bound (same as path version).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretCodeBatchRevealRequest"
      responses:
        "200":
          description: Batch reveal response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          secretList:
                            type: array
                            items:
                              $ref: "#/components/schemas/Secret"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/secrets/batchCreate:
    post:
      tags: [Secrets]
      summary: Batch create secrets across multiple envs with same key / different values
      description: |
        Creates N secrets in a single transaction. The client specifies an
        **`envList` array** of `{envCode, folderId, value}` triples; one
        secret is inserted per triple. The whole batch is one transaction
        (all-or-nothing) with **one** batch audit record.

        Use case: setting `DATABASE_URL` to a different value in a configurable
        set of envs (commonly dev / test / sim / prod, but `envCode` accepts
        any project-defined env code), in one request, instead of N serial
        `/secret/create` calls.

        **Note**: the path is `/api/v1/secrets/batchCreate` (plural `secrets`),
        kept on a separate route group from the single-secret `/secret/*` endpoints.

        **Important: business errors all return HTTP 200**, with the error code in
        the body. This is a deliberate departure from the rest of the API (which
        uses 4xx for business errors); the user can rely on `body.code` for the
        business outcome and on `body.msg` for a human-readable description.

        Body code matrix:

        - `0`  — success; `data` is `null` (the client may call `secretList` /
          `secret/path/info` to fetch metadata if needed).
        - `-1` — **all** business failures, including:
          - `msg: "入参校验，<描述>"` — input validation failed (empty
            `secretList` / invalid `key` format / missing `envCode` / missing
            `folderId` / duplicate `envCode` / duplicate `folderId` within
            same item / etc).
          - `msg: "创建失败，权限不足"` — caller lacks `secret:create` on at
            least one target folder (v7 cascade narrowing); the entire batch
            is rejected.
          - `msg: "创建失败，目标 folder 不存在"` — at least one target
            `folderId` does not exist.
          - `msg: "创建失败，secret 已存在"` — at least one `(folder, key)`
            already exists (PG `23505` unique violation); the entire batch
            is rolled back.
          - `msg: "创建失败，<err>"` — any other internal error.

        Behavior:

        - `secretList` must be non-empty; each `key` must match `^[A-Z][A-Z0-9_]*$`.
        - Each item's `envList` must have at least 1 entry; each entry's
          `envCode` and `folderId` are required.
        - `envCode` is the target env code (project-defined; not limited to
          the canonical dev/test/sim/prod set).
        - Within a single item, `envCode` must be unique (no two entries in
          the same env) and `folderId` must be unique (no two envs pointing
          to the same folder — would conflict with `(folder_id, key)`
          unique constraint).
        - Each entry's `folderId` must be a non-empty UUID; the system does
          **not** do any "find folder by code" lookup — the client is responsible
          for picking the correct target folder per env.
        - The number of secrets created = total `envList` length across all
          items (each entry creates one secret).
        - One `secret:create` permission check per target `(env, folder)` pair;
          any denial aborts the whole batch.
        - The DB layer writes N INSERTs and **one** `audit_records` row in a
          single transaction; `action="create_batch"`, `resource_type="folder"`,
          `resource_id=<first item's folder_id>`,
          `encrypted_value=jsonb([{envCode, key, secretId}, ...])`.
        - After commit, every created secret is upserted into the Redis
          `SecretCache` (same path as `/secret/create`).
        - No cross-project batch (each item's `folderId` lives in its own project;
          no project-level batch semantics).
        - No nested folder support; no `folderParentId` / `includeSubfolders`
          semantics (matches single `/secret/create`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretBatchCreateRequest"
      responses:
        "200":
          description: |
            Batch create response. **All responses** (success and business
            failure) return HTTP 200; the body code discriminates. The `data`
            field is always `null` in v11.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /api/v1/secrets/list:
    post:
      tags: [Secrets]
      summary: List secret values across multiple envs (跨 env 一次性 reveal)
      description: |
        Reveal a `(project, folderCode, [key])` tuple's value across an
        explicit `envList` in a single request. The server flattens each
        env's hit to a top-level `<envCode>` key, with `null` for envs the
        caller has no `secret:read` permission on (filtered out by the
        server) or where no secret is defined.

        Use case: a "config compare" page that needs to show one key's value
        across dev / test / sim / prod in a single round-trip, instead of
        calling `/secret/path/batchReveal` once per env or falling back to
        the project-wide `/secret/search` (which over-fetches).

        **`key` is optional**:

        - `key` non-empty → exact lookup of `(folderCode, key)` across `envList`
          (requires `folderCode`).
        - `key` empty → returns all `(folderCode, key)` tuples in the project
          that have a hit in any of the `envList` envs (`folderCode` is then
          an independent filter: empty = all folders, non-empty = limit to
          that folder).

        **Permission** (v12): action is `secret:read` (relaxed from
        `secret:reveal`). Holders of `secret:read` may see plaintext; the
        server-side cascade narrowing excludes secrets the caller cannot
        read. The single-point `/secret/reveal` endpoint still uses
        `secret:reveal` for fine-grained control.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretListAcrossEnvsRequest"
            examples:
              singleKey:
                summary: Exact lookup of one key across all 4 envs
                value:
                  projectId: 00000000-0000-0000-0000-000000000001
                  folderCode: ana-svc
                  key: DATABASE_URL
                  envList: [dev, test, sim, prod]
              allKeys:
                summary: All keys in the project, folderCode as a filter
                value:
                  projectId: 00000000-0000-0000-0000-000000000001
                  folderCode: ""
                  key: ""
                  envList: [dev, prod]
      responses:
        "200":
          description: |
            `data` is an array of `SecretAcrossEnvs` (1 element when
            `key` is provided, N elements when `key` is empty). Each
            element flattens env hits to the top level; missed envs
            serialize to `null`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SecretAcrossEnvs"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/search/global:
    post:
      tags: [Search]
      summary: Global search across org / project / env / folder / secret
      description: |
        Cross-resource keyword search. Matched fields (per resource type):

        - org / project / env / folder: `code`, `name`, `comment`
        - secret: `key`, `comment`, plus decrypted `value`

        The search runs entirely against Redis with 5 concurrent goroutines
        (one per resource type). The DB is not hit on the hot path; the cache
        is warmed at startup. Per-type result counts are capped by `limit`
        (default 50, max 200).

        RBAC: each candidate is filtered by the corresponding `:read` permission
        for the current user. The user only sees resources within their scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlobalSearchRequest"
            examples:
              keywordOnly:
                value:
                  keyword: aaa
              withTypeLimit:
                value:
                  keyword: database
                  types: ["secret", "env"]
                  limit: 20
      responses:
        "200":
          description: Aggregated matches per resource type.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GlobalSearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/tree/get:
    post:
      tags: [Tree]
      summary: Get the full org/project/env/folder resource tree
      description: |
        Returns the complete resource hierarchy as a tree of nodes, intended for
        frontend cascading filters (e.g. "select project → list its envs → select
        env → list its folders"). The response is shaped as a forest of
        `organization` roots, each containing nested `project` → `environment` →
        `folder(level=1)` → `folder(level=2)` chains.

        ## Performance model

        - **Read path**: the server tries the Redis cache first (4 separate hash
          sets: `org`, `project`, `env`, `folder`). On a cache miss, it falls
          back to the database via 4 unbounded `ListAll*ForTree` queries
          (narrowed by the caller's `user_role_bindings`) and warms the cache
          asynchronously before returning.
        - **Write path**: every CRUD on org/project/env/folder updates the
          cache synchronously (UpsertXxx) or invalidates it on cascade delete
          (DeleteXxx returns a `CascadeScope` and the handler iterates
          `DeleteXxx` for each affected type).

        ## RBAC

        No dedicated `tree:read` permission is required. The endpoint only
        requires a valid JWT; the visible set is naturally narrowed by the
        existing `org:read` / `project:read` / `env:read` / `folder:read`
        permission codes — same as the `List*` endpoints. A user with no
        bindings at all gets `data.roots: []` and all stats at zero.

        ## Orphan handling

        RBAC narrowing can produce "parent invisible, child visible" — e.g. a
        user with a direct `folder:read` grant on a sub-folder but no grant
        on its parent env. When `includeOrphans=true` (default), these
        orphaned nodes are attached to a synthetic root node
        (`id = "__orphans__"`, `code = "__orphans__"`, `name = "Orphan nodes
        (parent not accessible)"`). When `includeOrphans=false`, the orphans
        are dropped from the tree but `data.stats.orphans` still records the
        count for auditing.

        ## Depth truncation

        `maxDepth` (default `4`) limits the depth of the returned tree:

        - `1` → only `organization` nodes (`children` arrays are empty)
        - `2` → `+ project` (env/folder nodes omitted)
        - `3` → `+ environment` (folder nodes omitted)
        - `4` → `+ folder(level=1)` and `+ folder(level=2)` (the full tree)

        Stats fields reflect the **RBAC-narrowed** set before depth
        truncation, so `maxDepth=2` still reports `environments: 6` and
        `folders: 12` if those nodes are visible to the caller, even though
        they are not present in the truncated `roots` payload.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreeRequest"
            examples:
              defaults:
                summary: Default request (all 4 levels, orphans included)
                value: {}
              explicit:
                summary: Org/project only, no orphans
                value:
                  includeOrphans: false
                  maxDepth: 2
      responses:
        "200":
          description: Tree assembled from cache (or DB on cache miss).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ResourceTree"
              examples:
                cacheHit:
                  summary: Cache hit, three orgs with full subtree
                  value:
                    code: 0
                    msg: success
                    data:
                      roots:
                        - id: "<org-uuid-1>"
                          type: organization
                          code: acme
                          name: Acme Corp
                          children:
                            - id: "<project-uuid-1>"
                              type: project
                              parentId: "<org-uuid-1>"
                              code: web
                              name: Web
                              children:
                                - id: "<env-uuid-1>"
                                  type: environment
                                  parentId: "<project-uuid-1>"
                                  code: prod
                                  name: Production
                                  children:
                                    - id: "<folder-uuid-1>"
                                      type: folder
                                      level: 1
                                      parentId: "<env-uuid-1>"
                                      code: db
                                      name: Database
                                      children:
                                        - id: "<folder-uuid-2>"
                                          type: folder
                                          level: 2
                                          parentId: "<folder-uuid-1>"
                                          code: pg-main
                                          name: Postgres Main
                                          children: []
                      stats:
                        organizations: 1
                        projects: 1
                        environments: 1
                        folders: 2
                        dropped: 0
                        orphans: 0
                      generatedAt: "2026-06-06T12:34:56Z"
                      source: cache
                noBindings:
                  summary: Caller has no role bindings → empty forest
                  value:
                    code: 0
                    msg: success
                    data:
                      roots: []
                      stats:
                        organizations: 0
                        projects: 0
                        environments: 0
                        folders: 0
                        dropped: 0
                        orphans: 0
                      generatedAt: "2026-06-06T12:34:56Z"
                      source: database
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: |
            Returned when the tree service is not configured (typically because
            both the database and the Redis cache are unavailable, or the
            service failed to wire up at startup).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /api/v1/audit/list:
    post:
      tags: [Audit]
      summary: List audit records
      description: |
        Lists audit records. **Not narrowed by caller's `user_role_bindings`
        in v7**: `resource_type` is polymorphic across 6 ancestry paths
        (organization / project / environment / folder / secret /
        env_template), each requiring a case-by-case join to the
        corresponding resource table. To audit a specific resource, pass
        `resourceType` + `resourceId` and rely on the existing
        `audit:read` permission check; full list narrowing is on the
        roadmap (P1). See `design/todo.md` §"v7 不做的项（留 todo）".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PageRequest"
                - type: object
                  properties:
                    resourceType:
                      type: string
                    resourceId:
                      type: string
                      format: uuid
      responses:
        "200":
          $ref: "#/components/responses/AuditList"

  /api/v1/tree/get:
    post:
      tags: [Tree]
      summary: Get the visible resource tree (org → project → env → folder)
      description: |
        Assembles a hierarchical view of the resources the caller can see,
        cascading down 4 levels: organization → project → environment → folder
        (including level-1 and level-2 folders). The tree is built in the
        following order:

        1. Read cached tree snapshots from Redis (if present) for each level.
        2. Fall back to PostgreSQL `ListAll*ForTree` calls when the cache
           is missing or empty.
        3. Re-assemble the in-memory tree, apply caller's RBAC narrowing
           (`org:read` / `project:read` / `env:read` / `folder:read`),
           and prune the depth to `maxDepth`.

        RBAC: there is no dedicated `tree:read` permission. Visibility is
        controlled by the 4 `:read` codes (`org:read` / `project:read` /
        `env:read` / `folder:read`). A user with no binding on any of
        these scopes gets an empty `roots` array (no 403). This matches
        the v7 "implicit empty list" semantics used by `List*` endpoints.

        `maxDepth` levels:

        - 1 = only `organization`
        - 2 = + `project`
        - 3 = + `environment`
        - 4 = + `folder` (default; includes both level-1 and level-2 folders)

        Out-of-range or zero `maxDepth` is normalized to 4 server-side.

        `includeOrphans` controls what to do with nodes whose parent is
        not visible to the caller (e.g. an `env` whose parent `project`
        is hidden, but the env is bound to a higher-scope `org_admin`).
        When `false` (default), orphan nodes are dropped and counted in
        `stats.dropped`. When `true`, orphans are attached to a virtual
        root and counted in `stats.orphans`.

        `source` in the response is `"cache"` if the tree was fully
        served from Redis snapshots, `"database"` if any level fell
        back to DB, or `"mixed"`. Debug / metrics only; clients can
        ignore it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreeRequest"
            examples:
              default:
                value: {}
              withMaxDepth:
                value:
                  maxDepth: 2
              includeOrphans:
                value:
                  maxDepth: 4
                  includeOrphans: true
      responses:
        "200":
          description: Resource tree response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ResourceTreeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/BadRequest"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  requestBodies:
    ID:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IDRequest"
    IdOrCode:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IdOrCodeRequest"
    UpdateByIdOrCode:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateIdOrCodeRequest"
    CreateEntity:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateEntityRequest"
    CreateChildEntity:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateChildEntityRequest"
    UpdateEntity:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateEntityRequest"
    SecretList:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/PageRequest"
              - $ref: "#/components/schemas/SecretFilter"
    SecretSearch:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/PageRequest"
              - $ref: "#/components/schemas/SecretFilter"
              - type: object
                properties:
                  keyword:
                    type: string
                    example: DATABASE

  responses:
    Success:
      description: Success.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1002
            msg: invalid request
            data: null
    InvalidRequest:
      description: Invalid request body or parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1002
            msg: invalid argument
            data: null
    Unauthorized:
      description: Authentication failed (missing or invalid JWT, or bad credentials).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1401
            msg: bad credentials
            data: null
    Conflict:
      description: Resource conflict (e.g. email already exists).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1409
            msg: email already exists
            data: null
    RateLimited:
      description: Too many requests; IP is locked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1429
            msg: rate limited
            data: null
    Forbidden:
      description: Permission denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1403
            msg: permission denied
            data: null
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Response"
          example:
            code: 1404
            msg: record not found
            data: null
    Entity:
      description: Entity response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Response"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Entity"
    Deleted:
      description: Deleted response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Response"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
    OrganizationList:
      description: Organization list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OrganizationListResponse"
    ProjectList:
      description: Project list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectListResponse"
    EnvironmentList:
      description: Environment list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvironmentListResponse"
    EnvironmentTemplateList:
      description: Environment template list (org-scoped read-only summary).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvironmentTemplateListResponse"
    EnvironmentTemplate:
      description: Environment template detail.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Response"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/EnvironmentTemplate"
    FolderList:
      description: Folder list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderListResponse"
    Secret:
      description: Secret response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Response"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Secret"
    SecretList:
      description: Secret list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SecretListResponse"
    AuditList:
      description: Audit record list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuditListResponse"

  schemas:
    Response:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: success
        data:
          nullable: true

    IDRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    IdOrCodeRequest:
      type: object
      properties:
        parentId:
          type: string
          format: uuid
          description: |
            Required when using code. For /api/v1/project/* this is the org id; for
            /api/v1/env/* this is the project id; for /api/v1/folder/* this is the
            environment id; for /api/v1/env/template/* this is the org id.
        id:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
        description: id and code are mutually exclusive, one is required

    UpdateIdOrCodeRequest:
      type: object
      required: [name]
      properties:
        parentId:
          type: string
          format: uuid
          description: |
            Required when using code. For /api/v1/project/* this is the org id; for
            /api/v1/env/* this is the project id; for /api/v1/folder/* this is the
            environment id.
        id:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
        name:
          type: string
        comment:
          type: string
        description: id and code are mutually exclusive, one is required for update

    PageRequest:
      type: object
      properties:
        pageNum:
          type: integer
          minimum: 1
          default: 1
          example: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20

    PageResp:
      type: object
      description: |
        Paginated response wrapper. Shape depends on whether the result has data:

        - **Empty data** (`list.length === 0`): `{ "total": 0, "list": [] }` —
          `pageNum` / `pageSize` are **omitted**.
        - **Non-empty data**: `{ "pageNum": 1, "pageSize": 20, "total": N, "list": [...] }`.

        `pageNum` / `pageSize` are non-required for the same reason: when
        `list` is empty the server uses `omitempty` to drop them, and clients
        should not need to do `pageNum === undefined` defensive checks on
        empty-data responses. See `design/DESIGN.md`「分页响应 - 空数据形态」.
      required: [total, list]
      properties:
        pageNum:
          type: integer
          description: |
            Page number. **Omitted on empty-data responses.**
          example: 1
        pageSize:
          type: integer
          description: |
            Page size. **Omitted on empty-data responses.**
          example: 20
        total:
          type: integer
          format: int64
          example: 1
        list:
          type: array
          description: |
            Always a JSON array; on empty data it is `[]` (never `null`).
          items: {}

    CreateEntityRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          example: org-a
        name:
          type: string
          example: Organization A
        comment:
          type: string
          example: description

    CreateChildEntityRequest:
      allOf:
        - $ref: "#/components/schemas/CreateEntityRequest"
        - type: object
          required: [parentId]
          properties:
            parentId:
              type: string
              format: uuid
              description: |
                Parent resource id. For /api/v1/project/create this is the org id; for
                /api/v1/env/create this is the project id.

    CreateFolderRequest:
      type: object
      description: |
        **Batch-only folder creation** — there is no single-env shortcut on
        this endpoint. `envList` is always required; the legacy `parentId`
        field is removed; `parentCode` is used in its place for `level=2`.

        See `/api/v1/folder/create` description for the full contract.
      required: [level, code, name, envList]
      properties:
        level:
          type: integer
          enum: [1, 2]
          description: |
            1 = top-level folder (parent is the environment itself).
            2 = sub-folder (parent is a `level=1` folder identified by
            `parentCode` in each listed env).
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          example: globals
        name:
          type: string
          example: Globals
        comment:
          type: string
        parentCode:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: |
            **Required for `level=2`**, ignored for `level=1`. The code of the
            `level=1` parent folder. The server looks up the matching
            `level=1` folder with this code inside each env in `envList` and
            creates the new sub-folder under it.
          example: payment
        envList:
          type: array
          minItems: 1
          description: |
            **Required, must be non-empty.** Each element is the **id of an
            environment (UUID)**, not the env code. The server creates one
            folder per element, in a single transaction.

            If the array is missing, empty, or contains any value that isn't a
            valid UUID, the request is rejected (see responses below).
          items:
            type: string
            format: uuid
            example: "11111111-1111-1111-1111-111111111111"
          example:
            - "11111111-1111-1111-1111-111111111111"
            - "22222222-2222-2222-2222-222222222222"
            - "33333333-3333-3333-3333-333333333333"

    CreateFoldersBatchResponse:
      type: object
      description: |
        Returned by `/api/v1/folder/create` — the API is batch-only, so this
        is the only successful response shape. The list is in the same order
        as the request's `envList`, and `data.created[i].parentId` carries
        the id of either the env (for `level=1`) or the matching sibling
        `level=1` parent (for `level=2`).
      required: [created]
      properties:
        created:
          type: array
          items:
            $ref: "#/components/schemas/Entity"

    ResponseOfCreateFoldersBatch:
      description: Standard success envelope wrapping the batch creation result.
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateFoldersBatchResponse"

    EnvSpec:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          example: dev
        name:
          type: string
          example: Development
        comment:
          type: string
          example: shared dev env
        sortOrder:
          type: integer
          example: 10
          description: Optional display order. When omitted, backend defaults by code.
      description: |
        Inline spec used in /api/v1/project/create to declare an environment to create.
        The matching `environment_templates` row is upserted on first write only; subsequent
        project creates with the same code will NOT overwrite the template's name/comment.

    UpdateEntityRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: org-a
        name:
          type: string
        comment:
          type: string

    Entity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          description: |
            Direct parent's id. Omitted for top-level entities (organizations).
            Set to org_id for projects, project_id for environments,
            environment_id for folders.
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
        name:
          type: string
        comment:
          type: string
        sortOrder:
          type: integer
          description: Present for environments. Other entity types omit this field.
        createdBy:
          type: string
          example: 00000000-0000-4000-8000-000000000001
        createdByLabel:
          type: string
          example: Dev User
        updatedBy:
          type: string
          example: 00000000-0000-4000-8000-000000000001
        updatedByLabel:
          type: string
          example: Dev User
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserInfo:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string

    DevTokenRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          example: 00000000-0000-4000-8000-000000000001
        name:
          type: string
          example: Dev User
        expiresInSeconds:
          type: integer
          example: 3600

    DevToken:
      type: object
      properties:
        tokenType:
          type: string
          example: Bearer
        token:
          type: string
        expiresAt:
          type: string
          format: date-time

    AuthRegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          minLength: 1
          example: Alice
        password:
          type: string
          format: password
          minLength: 12
          example: correct-horse-battery-staple

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: correct-horse-battery-staple

    AuthChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
          format: password
          example: correct-horse-battery-staple
        newPassword:
          type: string
          format: password
          minLength: 12
          example: new-correct-horse-12+chars

    AuthTokenResponse:
      type: object
      properties:
        userId:
          type: string
          example: email:alice@example.com
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice
        token:
          type: string
          description: Signed JWT (RS256 / ES256 / EdDSA depending on configured key).
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    SecretFilter:
      type: object
      description: |
        Filter for /api/v1/secret/list and /api/v1/secret/search. Only `folderId`
        and `environmentId` are accepted — `orgId` and `projectId` were removed
        because they correspond to "list every secret in the org/project" which
        is a security-tier operation and shouldn't be exposed through a regular
        list endpoint. Exactly one of `folderId` or `environmentId` is required.
      properties:
        environmentId:
          type: string
          format: uuid
          description: List secrets in this env (across all folders).
        folderId:
          type: string
          format: uuid
          description: List secrets in this specific folder.
          type: string
          format: uuid

    SecretPathRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: |
            The 4-level code path to the secret in the form
            `org_code.project_code.env_code.folder_code.KEY`. Must contain
            exactly 5 dot-separated, non-empty segments.
          pattern: "^[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Z][A-Z0-9_]*$"
          example: o1.p1.dev.globals.DATABASE_URL

    SecretPathBatchRevealRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: |
            4-level code path of the folder in the form
            `org_code.project_code.env_code.folder_code` (no KEY segment).
            Must contain exactly 4 dot-separated, non-empty segments.
          pattern: "^[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+$"
          example: o1.p1.dev.globals
        keys:
          type: array
          description: |
            Optional list of secret keys to reveal. Empty / omitted = reveal every
            secret in the folder (no pagination, no upper bound).
          items:
            type: string
            pattern: "^[A-Z][A-Z0-9_]*$"
          example: ["DATABASE_URL", "API_KEY"]

    SecretCodeBatchRevealRequest:
      type: object
      description: |
        Reveals every secret under a folder resolved by **structured** 4-level codes
        (org → project → environment → folder). Each code segment is a separate
        field; no path string is split on the server side.

        Equivalent to `/secret/path/batchReveal` with `keys` omitted — returns all
        secrets in the folder in one round-trip. The single difference is the
        input shape: structured fields (preferred for SDK / K8s integrations that
        already have the codes individually) vs a `.`-separated path string.
      required: [orgCode, projectCode, environmentCode, folderCode]
      properties:
        orgCode:
          type: string
          description: "Organization code. Pattern: `^[a-z0-9]+(-[a-z0-9]+)*$`."
          example: acme
        projectCode:
          type: string
          description: "Project code (unique within the org). Same pattern as `orgCode`."
          example: webapp
        environmentCode:
          type: string
          description: "Environment code (unique within the project). Same pattern as `orgCode`."
          example: prod
        folderCode:
          type: string
          description: |
            Folder code. It is unique only under the same parent Folder (or among
            root Folders in the environment), not across the whole environment.
            The current 4-code endpoint is therefore intended for Folder codes
            that resolve uniquely in the target environment.
          example: globals

    SecretPathBatchRevealResponse:
      type: object
      required: [path, list]
      properties:
        path:
          type: string
          description: The folder path the request was resolved against (echoed back).
          example: o1.p1.dev.globals
        list:
          type: array
          description: |
            Revealed secrets ordered by `key` ASC. Each item follows the same
            `Secret` schema as `/secret/reveal` / `/secret/path/reveal`, with
            `value` populated to the plaintext.
          items:
            $ref: "#/components/schemas/Secret"
        notFound:
          type: array
          description: |
            Request keys that did not match any secret in the folder (in request
            order). Only present when the request supplied a non-empty `keys`
            list; absent when `keys` was empty / omitted (no comparison possible).
          items:
            type: string
          example: ["MISSING_KEY"]

    SecretBatchCreateRequest:
      type: object
      required: [secretList]
      properties:
        secretList:
          type: array
          minItems: 1
          description: |
            List of secrets to create. For each item, the system iterates the
            `envList` and creates one secret per entry. The number of entries
            per item determines how many secrets get created for that key.
          items:
            $ref: "#/components/schemas/SecretBatchCreateItemRequest"

    SecretBatchCreateItemRequest:
      type: object
      required: [key, envList]
      properties:
        key:
          type: string
          pattern: "^[A-Z][A-Z0-9_]*$"
          description: The secret key (same constraints as `/secret/create`).
          example: DATABASE_URL
        comment:
          type: string
          description: Optional per-item comment, persisted on each created secret.
        envList:
          type: array
          minItems: 1
          description: |
            List of (env, folder, value) triples. The system creates one
            secret per entry. `envCode` is project-defined (not limited to
            dev/test/sim/prod). Within a single item, `envCode` and
            `folderId` must each be unique across the array.
          items:
            $ref: "#/components/schemas/SecretBatchEnvTarget"

    SecretBatchEnvTarget:
      type: object
      description: |
        Per-env target for a single secret. The client must explicitly supply
        the `envCode` and `folderId`; the system does **not** look up envs
        or folders by code (no "template folder" mechanism in v11).
      required: [envCode, folderId, value]
      properties:
        envCode:
          type: string
          description: |
            Target env code. Project-defined; the system will resolve it to
            an env id and verify the user has `secret:create` permission
            on the specified folder. Common values are `dev`, `test`,
            `sim`, `prod`, but any project-defined env code is accepted.
          example: dev
        folderId:
          type: string
          format: uuid
          description: The id of the folder in this env where the secret will be created.
          example: f-dev-uuid
        value:
          type: string
          description: The plaintext value of the secret.
          example: postgres://dev.local/db

    SecretListAcrossEnvsRequest:
      type: object
      description: |
        Cross-env secret reveal request. `envList` is required (1..32 entries,
        trimmed + de-duplicated server-side). `key` is optional: omit it to
        list every `(folderCode, key)` tuple in the project. `folderCode` is
        mandatory when `key` is provided; when `key` is empty, `folderCode`
        becomes an optional filter.
      required: [projectId, envList]
      properties:
        projectId:
          type: string
          format: uuid
          description: Project id; the project must be active and visible to the caller.
        folderCode:
          type: string
          description: |
            Folder code. **Required when `key` is provided**; otherwise an
            optional filter (empty = all folders in the project).
          example: ana-svc
        key:
          type: string
          description: |
            Secret key. Optional. When provided, must match `^[A-Z][A-Z0-9_]*$`
            and `folderCode` is required.
          example: DATABASE_URL
        envList:
          type: array
          minItems: 1
          maxItems: 32
          description: |
            Target env codes (project-defined). Entries are trimmed and
            de-duplicated; empty strings are dropped. Order in the response
            is JSON map order (caller should look up by key, not by index).
          items:
            type: string
          example: [dev, test, sim, prod]

    SecretAcrossEnvs:
      type: object
      description: |
        One `(folderCode, key)` group's reveal across the requested `envList`.
        The `MarshalJSON` flattens each env hit to a top-level `<envCode>`
        key with shape `{value, version, folderId, comment?, updatedAt}`;
        envs without a hit (or filtered out by RBAC) serialize to `null`.
        **Request-side `projectId` / `folderCode` are not echoed**;
        `projectCode` is the project's code (derived from the matched
        secret) and is kept for display.
      required: [projectCode, key]
      properties:
        projectCode:
          type: string
          description: The matched secret's project code.
        key:
          type: string
          description: The secret key.
        comment:
          type: string
          description: |
            Comment from the first env that hit (each env has its own
            comment; we surface the first one for display).
        "<envCode>":
          description: |
            Per-env value. The top-level key is the env code. Missed envs
            (or envs filtered by RBAC narrowing) serialize to `null`.
          oneOf:
            - $ref: "#/components/schemas/EnvSecretValue"
            - type: "null"

    EnvSecretValue:
      type: object
      description: Per-env secret value within a `SecretAcrossEnvs` group.
      required: [folderId, value, version, updatedAt]
      properties:
        folderId:
          type: string
          format: uuid
          description: The folder id this env-specific secret lives in.
        value:
          type: string
          description: Plaintext value (server-decrypted).
        version:
          type: integer
        comment:
          type: string
        updatedAt:
          type: string
          format: date-time

    SecretUpsertRequest:
      type: object
      required: [folderId, key, value]
      properties:
        folderId:
          type: string
          format: uuid
        key:
          type: string
          pattern: "^[A-Z][A-Z0-9_]*$"
          example: DATABASE_URL
        value:
          type: string
          example: postgres://user:password@host:5432/db
        comment:
          type: string

    Secret:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        orgCode:
          type: string
        projectId:
          type: string
          format: uuid
        projectCode:
          type: string
        environmentId:
          type: string
          format: uuid
        environmentCode:
          type: string
        folderId:
          type: string
          format: uuid
        folderCode:
          type: string
        key:
          type: string
        path:
          type: string
          example: org-a.project-a.dev.globals.DATABASE_URL
        value:
          type: string
          description: |
            Plaintext value. Only returned by `/api/v1/secret/reveal`,
            `/api/v1/secret/path/reveal`, and items in the `list` array of
            `/api/v1/secret/path/batchReveal` responses.
        comment:
          type: string
        createdBy:
          type: string
          example: dev-user
        createdByLabel:
          type: string
          example: Dev User
        updatedBy:
          type: string
          example: dev-user
        updatedByLabel:
          type: string
          example: Dev User
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GlobalSearchRequest:
      type: object
      required: [keyword]
      properties:
        keyword:
          type: string
          minLength: 1
          description: Substring to match. Case-insensitive.
          example: aaa
        types:
          type: array
          items:
            type: string
            enum: [org, project, env, folder, secret]
          description: |
            Subset of resource types to search. Empty = all 5 types.
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
          description: Per-type result cap.

    GlobalSearchResult:
      type: object
      properties:
        orgs:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchHit" }
        projects:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchHit" }
        envs:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchHit" }
        folders:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchHit" }
        secrets:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchHit" }

    GlobalSearchHit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        comment:
          type: string
        matchField:
          type: string
          description: |
            Which field matched the keyword: `code` / `name` / `comment` / `value`
            (the latter only for secret type).
        key:
          type: string
          description: Only set for secret hits.
        path:
          type: string
          description: Only set for secret hits.
        folderId:
          type: string
          format: uuid
          description: Only set for secret hits.
        envId:
          type: string
          format: uuid
          description: Set for env / folder / secret hits.
        projectId:
          type: string
          format: uuid
          description: Set for project / env / folder / secret hits.
        orgId:
          type: string
          format: uuid
          description: Set for org / project / env / folder / secret hits.

    AuditRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        actor:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
          format: uuid
        action:
          type: string
        encryptedValue:
          type: object
        createdAt:
          type: string
          format: date-time

    OrganizationListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: "#/components/schemas/Entity"

    ProjectListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: "#/components/schemas/Entity"

    EnvironmentListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: "#/components/schemas/Entity"

    EnvironmentTemplate:
      type: object
      required: [id, orgId, code, name, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
        name:
          type: string
        comment:
          type: string
        createdBy:
          type: string
        createdByLabel:
          type: string
        updatedBy:
          type: string
        updatedByLabel:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EnvironmentTemplateListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: "#/components/schemas/EnvironmentTemplate"

    FolderListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      description: |
                        List items are `Entity` by default. When the request sets
                        `includeSubfolders: true` (only valid in `environmentId`
                        mode), each item is upgraded to `FolderWithSubfolders`,
                        which embeds `Entity` and adds a `subfolders` array.
                      items:
                        $ref: "#/components/schemas/FolderWithSubfolders"

    FolderWithSubfolders:
      allOf:
        - $ref: "#/components/schemas/Entity"
        - type: object
          required: [subfolders]
          properties:
            subfolders:
              type: array
              description: |
                Level=2 children of this parent folder (always a JSON array,
                possibly empty). RBAC-narrowed independently from the parent:
                a child the caller cannot see simply does not appear here.
                Sorted by `name` ASC.
              items:
                $ref: "#/components/schemas/Entity"

    SecretListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: "#/components/schemas/Secret"

    AuditListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/PageResp"
                - type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: "#/components/schemas/AuditRecord"

    TreeNodeType:
      type: string
      description: |
        Identifies a node's resource category. Avoids the need for clients
        to guess from id prefixes.
      enum: [organization, project, environment, folder]
      example: folder

    TreeRequest:
      type: object
      description: |
        `maxDepth` controls how many levels the returned tree descends to:

        - 1 = organization
        - 2 = + project
        - 3 = + environment
        - 4 = + folder (default; includes both level-1 and level-2 folders)

        Out-of-range or zero `maxDepth` is normalized to 4 server-side.
      properties:
        includeOrphans:
          type: boolean
          default: true
          description: |
            When `true` (default), nodes whose parent is not visible to the
            caller (e.g. an env whose parent project is hidden, but the env
            is bound at a higher scope) are attached to a virtual root
            (`id = "__orphans__"`) and counted in `stats.orphans`. When
            `false`, such nodes are dropped from `roots` but still counted
            in `stats.orphans` for audit.
        maxDepth:
          type: integer
          format: int32
          minimum: 1
          maximum: 4
          default: 4
          description: |
            Maximum depth of the returned tree. Out-of-range or zero
            values are normalized to 4 server-side.
      example:
        maxDepth: 4
        includeOrphans: true

    TreeNode:
      type: object
      description: |
        Tree node DTO. Audit fields (createdBy / updatedBy / at) are
        intentionally omitted; use the corresponding `info` endpoint to
        fetch them. `children` is always a (possibly empty) array so
        clients can call `children.map(...)` without null checks.
      required: [id, type, code, name, children]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/TreeNodeType"
        level:
          type: integer
          format: int32
          enum: [1, 2]
          description: "Only present for `type: folder`. 1 = top-level, 2 = child."
        parentId:
          type: string
          format: uuid
          description: |
            Parent node id. Top-level `organization` nodes have no
            `parentId`; for `type: folder` with `level: 1` the parent
            is the environment id; for `level: 2` the parent is the
            level-1 folder id.
        code:
          type: string
          example: globals
        name:
          type: string
          example: Globals
        comment:
          type: string
          description: Optional human-readable comment.
        children:
          type: array
          description: |
            Child nodes (always a JSON array, possibly empty). Order
            follows the underlying resource's natural ordering.
          items:
            $ref: "#/components/schemas/TreeNode"

    TreeStats:
      type: object
      description: |
        Statistics about the assembled tree. Useful for debugging
        narrowing behavior and for surfacing "you have N hidden items"
        hints in the UI.
      required: [organizations, projects, environments, folders, dropped, orphans]
      properties:
        organizations:
          type: integer
          format: int32
          description: Caller-visible organization nodes included in the tree.
        projects:
          type: integer
          format: int32
          description: Caller-visible project nodes included in the tree.
        environments:
          type: integer
          format: int32
          description: Caller-visible environment nodes included in the tree.
        folders:
          type: integer
          format: int32
          description: Caller-visible folder nodes (sum of level-1 + level-2) included in the tree.
        dropped:
          type: integer
          format: int32
          description: |
            Nodes that were dropped because their parent is not visible
            to the caller AND `includeOrphans` was `false` (default).
        orphans:
          type: integer
          format: int32
          description: |
            Nodes that were attached to a virtual root because their
            parent is not visible to the caller AND `includeOrphans`
            was `true`. Only meaningful when `includeOrphans` is enabled.

    ProjectFolderRequest:
      type: object
      description: |
        Request body for `POST /api/v1/folder/listByProject`. Currently
        just carries the `projectId` to scope the aggregation.
      required: [projectId]
      properties:
        projectId:
          type: string
          format: uuid
          description: |
            The project whose folder structure should be returned. Must be
            a UUID. Folders the caller is not allowed to read are filtered
            server-side; if the caller has no `folder:read` grants under
            the project, `data.folderList` will be empty.
          example: "11111111-1111-1111-1111-111111111111"

    ProjectFolderTree:
      type: object
      description: |
        Response body for `POST /api/v1/folder/listByProject`. Wraps a
        `folderList` of `FolderGroup` nodes; each group aggregates all
        envs in which a unique `level=1` code exists under the project.
      required: [folderList]
      properties:
        folderList:
          type: array
          description: |
            Sorted by `code` ascending. Always a JSON array (possibly
            empty) — never `null` — so the client can iterate
            unconditionally.
          items:
            $ref: "#/components/schemas/FolderGroup"

    FolderGroup:
      type: object
      description: |
        Aggregated `level=1` folder node. Groups every env in which the
        folder exists under the same `code`; per-instance `id`/`name`/
        `comment` come from the first env instance.
      required: [id, code, name, envList, subFolders]
      properties:
        id:
          type: string
          format: uuid
          description: Id of the first env instance of this code.
        code:
          type: string
          example: payment
        name:
          type: string
          example: Payment Providers
        comment:
          type: string
          description: Optional human-readable comment.
        envList:
          type: array
          description: |
            Envs in which this folder exists, with the per-env folder id
            inlined so the client can issue `/secret/list`/`/secret/reveal`
            without an extra `/folder/list` round-trip.
            Order is deterministic, matching the SQL `ORDER BY` clause.
          items:
            $ref: "#/components/schemas/EnvRef"
        subFolders:
          type: array
          description: |
            Sorted by `code` ascending. Each element is an aggregated
            `level=2` sub-folder (also grouped by code across envs).
            Per the "子目录跟随父目录" contract, this array is
            guaranteed to contain every `level=2` sub-folder the caller
            can read under this parent in this project.
          items:
            $ref: "#/components/schemas/SubFolderGroup"

    SubFolderGroup:
      type: object
      description: |
        Aggregated `level=2` sub-folder node under a `FolderGroup`.
        Carries no further nesting — `level=2` is the deepest folder
        layer in the current data model.
      required: [id, code, name, envList]
      properties:
        id:
          type: string
          format: uuid
          description: Id of the first env instance of this code.
        code:
          type: string
          example: stripe
        name:
          type: string
          example: Stripe
        comment:
          type: string
        envList:
          type: array
          description: |
            Envs in which this sub-folder exists (each element is an
            `EnvRef` carrying env id / env code / the env-specific folder
            id). When the parent `FolderGroup` exists in more envs than
            the sub-folder (e.g. parent in 3 envs, sub in only 2), the
            sub-folder's `envList` is a subset of the parent's `envList`.
          items:
            $ref: "#/components/schemas/EnvRef"

    EnvRef:
      type: object
      description: |
        Triple (envId, envCode, folderId) describing "this folder code
        exists in env X as folder Y". Returned inside `FolderGroup.envList`
        and `SubFolderGroup.envList`.
      required: [id, code, folderId]
      properties:
        id:
          type: string
          format: uuid
          description: Env id.
        code:
          type: string
          description: Env code (e.g. dev / test / sim / prod).
          example: dev
        folderId:
          type: string
          format: uuid
          description: |
            The id of the folder instance in this env that shares the
            enclosing group's `code`. Lets the client go directly to
            `/secret/list` or `/secret/reveal` for this env.

    ResourceTreeResponse:
      type: object
      required: [roots, stats, generatedAt, source]
      properties:
        roots:
          type: array
          description: |
            Top-level (`organization`) nodes of the assembled tree.
            May be empty if the caller has no visible organizations.
          items:
            $ref: "#/components/schemas/TreeNode"
        stats:
          $ref: "#/components/schemas/TreeStats"
        generatedAt:
          type: string
          format: date-time
          description: |
            Server-side timestamp of when this tree was assembled.
            Used by the client to detect stale caches.
        source:
          type: string
          enum: [cache, database]
          description: |
            Where the tree was assembled from. Debug / metrics only;
            clients can ignore this field.
            - `cache`: served entirely from Redis snapshots.
            - `database`: cache was unavailable or empty; assembled from DB
              and the snapshot was queued for an async warm-up.
