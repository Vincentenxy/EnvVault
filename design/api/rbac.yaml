openapi: 3.0.3
info:
  title: EnvVault RBAC API
  version: 0.1.0
  description: EnvVault RBAC interfaces for permissions, roles, users, and role bindings.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: RBAC Permissions
  - name: RBAC Roles
  - name: RBAC Bindings
  - name: RBAC Users
paths:
  /api/v1/rbac/permission/list:
    post:
      tags:
        - RBAC Permissions
      summary: List system permissions
      operationId: listPermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          description: Permission list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PageResp"
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Permission"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/rbac/me/permissions:
    post:
      tags:
        - RBAC Permissions
      summary: Get current user permissions in a scope
      operationId: getMyPermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopeRequest"
      responses:
        "200":
          description: Effective permissions for current user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PermissionCodeList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/rbac/role/list:
    post:
      tags:
        - RBAC Roles
      summary: List roles in a scope
      operationId: listRoles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ScopeRequest"
                - $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          description: Role list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PageResp"
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Role"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/rbac/role/info:
    post:
      tags:
        - RBAC Roles
      summary: Get role detail
      operationId: getRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleInfoRequest"
      responses:
        "200":
          description: Role detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Role"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/rbac/role/create:
    post:
      tags:
        - RBAC Roles
      summary: Create a custom role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpsertRequest"
      responses:
        "200":
          description: Created role.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/rbac/role/update:
    post:
      tags:
        - RBAC Roles
      summary: Update a custom role
      operationId: updateRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - id
                  properties:
                    id:
                      type: string
                      format: uuid
                - $ref: "#/components/schemas/RoleUpsertRequest"
      responses:
        "200":
          description: Updated role.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/rbac/role/delete:
    post:
      tags:
        - RBAC Roles
      summary: Delete a custom role
      operationId: deleteRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IDRequest"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/rbac/binding/list:
    post:
      tags:
        - RBAC Bindings
      summary: List role bindings in a scope
      operationId: listRoleBindings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ScopeRequest"
                - $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          description: Role binding list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PageResp"
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: "#/components/schemas/RoleBinding"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/rbac/binding/grant:
    post:
      tags:
        - RBAC Bindings
      summary: Grant a role to a user in a scope
      operationId: grantRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleGrantRequest"
      responses:
        "200":
          description: Created role binding.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RoleBinding"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/rbac/binding/revoke:
    post:
      tags:
        - RBAC Bindings
      summary: Revoke a role from a user in a scope
      operationId: revokeRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleRevokeRequest"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/rbac/user/me:
    post:
      tags:
        - RBAC Users
      summary: List direct grants for the current user
      operationId: getCurrentRBACUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          description: Current RBAC user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PageResp"
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: "#/components/schemas/RoleBinding"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/rbac/user/list:
    post:
      tags:
        - RBAC Users
      summary: List users visible in a scope
      operationId: listRBACUsers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ScopeRequest"
                - $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          description: User list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PageResp"
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/rbac/user/grants:
    post:
      tags:
        - RBAC Users
      summary: List direct grants for a user
      operationId: listUserGrants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/UserLookupRequest"
                - $ref: "#/components/schemas/PageRequest"
      responses:
        "200":
          description: Direct grants for the user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PageResp"
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: "#/components/schemas/RoleBinding"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/rbac/user/permissions:
    post:
      tags:
        - RBAC Users
      summary: Get user permissions in a scope
      operationId: getUserPermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/UserLookupRequest"
                - $ref: "#/components/schemas/ScopeRequest"
      responses:
        "200":
          description: Effective permissions and source grants.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EffectivePermissionResult"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 1002
            msg: invalid request
            data: null
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 1401
            msg: missing bearer token
            data: null
    Forbidden:
      description: Permission denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 1403
            msg: permission denied
            data: null
    NotFound:
      description: Record not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 1404
            msg: record not found
            data: null
    Conflict:
      description: Business conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 1409
            msg: conflict
            data: null
    Deleted:
      description: Deleted successfully.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Response"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true

  schemas:
    Response:
      type: object
      required:
        - code
        - msg
        - data
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: success
        data:
          nullable: true

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/Response"

    IDRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid

    ScopeType:
      type: string
      enum:
        - global
        - organization
        - project
        - environment
        - folder

    ScopeRequest:
      type: object
      required:
        - scopeType
      properties:
        scopeType:
          $ref: "#/components/schemas/ScopeType"
        scopeId:
          type: string
          format: uuid
          nullable: true
          description: Required when scopeType is not global.

    UserLookupRequest:
      type: object
      required:
        - externalUserId
      properties:
        externalUserId:
          type: string
          example: user-123

    PageRequest:
      type: object
      properties:
        pageNum:
          type: integer
          minimum: 1
          default: 1
          example: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20

    PageResp:
      type: object
      required:
        - pageNum
        - pageSize
        - total
        - list
      properties:
        pageNum:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        total:
          type: integer
          format: int64
          example: 128
        list:
          type: array
          items: {}

    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: secret:update
        resourceType:
          type: string
          example: secret
        action:
          type: string
          example: update
        description:
          type: string
        isSystem:
          type: boolean

    PermissionCodeList:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
          example:
            - project:read
            - secret:list
            - secret:read

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: project_admin
        name:
          type: string
          example: Project Admin
        description:
          type: string
        scopeType:
          $ref: "#/components/schemas/ScopeType"
        orgId:
          type: string
          format: uuid
          nullable: true
        projectId:
          type: string
          format: uuid
          nullable: true
        isSystem:
          type: boolean
        permissions:
          type: array
          items:
            type: string
          example:
            - project:read
            - project:update
            - secret:create
            - secret:update

    RoleInfoRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: project_admin
      anyOf:
        - required:
            - id
        - required:
            - code

    RoleUpsertRequest:
      type: object
      required:
        - scopeType
        - code
        - name
        - permissions
      properties:
        scopeType:
          $ref: "#/components/schemas/ScopeType"
        scopeId:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
          example: release_operator
        name:
          type: string
          example: Release Operator
        description:
          type: string
          example: Release deployment operator.
        permissions:
          type: array
          items:
            type: string
          example:
            - secret:list
            - secret:read
            - secret:reveal

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        externalUserId:
          type: string
          example: user-123
        name:
          type: string
          example: Alice
        email:
          type: string
          example: alice@example.com
        source:
          type: string
          example: jwt
        isDisabled:
          type: boolean
        lastSeenAt:
          type: string
          format: date-time
          nullable: true

    RoleBinding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
        roleCode:
          type: string
          example: project_developer
        roleId:
          type: string
          format: uuid
        scopeType:
          $ref: "#/components/schemas/ScopeType"
        scopeId:
          type: string
          format: uuid
          nullable: true
        grantedBy:
          type: string
          example: admin-user
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    RoleGrantRequest:
      type: object
      required:
        - externalUserId
        - roleCode
        - scopeType
      properties:
        externalUserId:
          type: string
          example: user-123
        name:
          type: string
          example: Alice
        email:
          type: string
          example: alice@example.com
        roleCode:
          type: string
          example: project_developer
        scopeType:
          $ref: "#/components/schemas/ScopeType"
        scopeId:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true

    RoleRevokeRequest:
      type: object
      required:
        - externalUserId
        - roleCode
        - scopeType
      properties:
        externalUserId:
          type: string
          example: user-123
        roleCode:
          type: string
          example: project_developer
        scopeType:
          $ref: "#/components/schemas/ScopeType"
        scopeId:
          type: string
          format: uuid
          nullable: true

    EffectivePermissionResult:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
          example:
            - project:read
            - project:update
            - secret:list
            - secret:read
            - secret:reveal
        sourceGrants:
          type: array
          items:
            type: object
            properties:
              roleCode:
                type: string
                example: org_admin
              scopeType:
                $ref: "#/components/schemas/ScopeType"
              scopeId:
                type: string
                format: uuid
                nullable: true
