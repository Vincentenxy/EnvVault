# 本地开发配置。生产环境请使用 ENVVAULT_CONFIG_PATH 指向独立配置文件，
# 或通过 ENVVAULT_DATABASE_PASSWORD 等环境变量覆盖敏感值。
http:
  addr: ":8080"
  request_id_header: "x-request-id"

auth:
  jwt_secret: "dev-only-change-me"

security:
  # base64("0123456789abcdef0123456789abcdef")，仅用于本地开发。
  encryption_key: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="

database:
  host: "127.0.0.1"
  port: 5432
  user: "admin"
  password: "123456"
  name: "envvault"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "30m"
  connect_timeout: "5s"

redis:
  enabled: true
  mode: "single" # single 或 cluster
  addrs:
    - "127.0.0.1:6379"
  password: ""
  db: 0
  key_prefix: "envvault"
  warm_up_on_start: true
  pool_size: 10
  min_idle_conns: 2
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
